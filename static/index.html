<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見やすいWebページを作ろう | Gemma 3 API版</title>

    <link rel="stylesheet" href="static/css/base.css?v=3">
    <link rel="stylesheet" href="static/css/title.css?v=3">
    <link rel="stylesheet" href="static/css/howto.css?v=3">
    <link rel="stylesheet" href="static/css/game.css?v=3">
    <link rel="stylesheet" href="static/css/preview.css?v=3">
    <link rel="stylesheet" href="static/css/evaluation.css?v=3">
    <link rel="stylesheet" href="static/css/explanation.css?v=3">
    <link rel="stylesheet" href="static/css/settings.css?v=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Noto+Sans+JP:wght@400;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <!-- 各ページ（section）はstatic/pages/*.htmlから動的に読み込まれます -->
        <div id="page-container">
            <div class="loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px;">
                <div class="loading-spinner"></div>
                <p>ページを読み込んでいます...</p>
            </div>
        </div>
    </div>

    <!-- テストモードバナー（全画面共通） -->
    <div id="test-mode-banner" style="display:none;">
        🔧 テストモード中 — AIは呼び出されません
    </div>

    <!-- パスワード確認モーダル -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal-card">
            <p class="modal-title">デバッグモード</p>
            <p class="modal-sub">パスワードを入力してください</p>
            <input type="password" id="password-input" class="modal-input" placeholder="パスワード" autocomplete="off">
            <p id="password-error" class="modal-error"></p>
            <div class="modal-actions">
                <button id="btn-modal-cancel" class="btn-secondary">キャンセル</button>
                <button id="btn-modal-confirm" class="btn-primary">確認</button>
            </div>
        </div>
    </div>

    <script type="module" src="static/js/app.js"></script>
</body>

</html>
